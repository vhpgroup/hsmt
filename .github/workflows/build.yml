name: Build Windows EXE
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt pyinstaller
      - name: Build exe
        run: pyinstaller --onefile --windowed --name HSMT-Analyzer main.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HSMT-Analyzer-win64
          path: dist/HSMT-Analyzer.exe
